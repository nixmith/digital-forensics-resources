e entries. Note the inode number for\neach entry you intend to examine further.</p>\n<hr />"

  {
    "title": "Task 5 — Deleted File Recovery",
    "content": "<p>The deleted entry in the <code>fls</code> output has its line\nbeginning with <code>-/r *</code>. The inode number follows the\n<code>*</code>.</p>\n<p>Examine its metadata:</p>\n<pre class=\"bash\"><code>istat -o 2048 exhibit-a.dd 75</code></pre>\n<p><strong>Expected output (abridged):</strong></p>\n<pre><code>MFT Entry Header Values:\nEntry: 75        Sequence: 2\n$LogFile Sequence Number: ...\nNot Allocated File\n\n$STANDARD_INFORMATION Attribute Values:\n...\nCreated:        2026-03-12 22:03:17.000000000 (UTC)\nFile Modified:  2026-03-12 22:03:17.000000000 (UTC)\nMFT Modified:   2026-03-12 22:03:17.000000000 (UTC)\nAccessed:       2026-03-12 22:03:17.000000000 (UTC)\n\n$FILE_NAME Attribute Values:\nName: readme.txt\n...\nAttributes:\nType: $DATA (128-128-2)   Name: $Data   Resident   size: 31</code></pre>\n<p>Note the <code>Not Allocated File</code> status — the file is deleted\nbut the MFT entry and its content remain recoverable. Now recover\nit:</p>\n<pre class=\"bash\"><code>icat -o 2048 exhibit-a.dd 75</code></pre>\n<p><strong>Expected output:</strong></p>\n<pre><code>archive is ready, key is safe</code></pre>\n<p>Record what the file contains. Does it suggest anything about the\nuser’s activity or intent?</p>\n<hr />"
  },
  {
    "title": "Task 6 — Extension Mismatch",
    "content": "<p>One allocated file has an extension that does not match its actual\nformat. Identify it from the <code>fls</code> listing, note its inode,\nand inspect its first bytes:</p>\n<pre class=\"bash\"><code>icat -o 2048 exhibit-a.dd &lt;inode&gt; | xxd | head -4</code></pre>\n<p><strong>Expected output for the suspicious file:</strong></p>\n<pre><code>00000000: 50 4b 03 04 14 00 06 00 08 00 00 00 21 00 a1 b2  PK..........!...\n00000010: d7 35 1b 00 00 00 17 00 00 00 0b 00 08 00 5f 72  .5............_r\n00000020: 65 6c 73 2f 74 68 65 6d 65 2f 74 68 65 6d 65 31  els/theme/theme1\n00000030: 2e 78 6d 6c 9c 54 cd 6e db 30 10 be 17 f8 0e 40  .xml.T.n.0.....@</code></pre>\n<p>The first few bytes are the file’s <em>magic bytes</em> — a format\nsignature independent of the filename. Common signatures:</p>\n<table>\n<thead>\n<tr class=\"header\">\n<th>Magic bytes</th>\n<th>Format</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td><code>25 50 44 46</code></td>\n<td>PDF (<code>%PDF</code>)</td>\n</tr>\n<tr class=\"even\">\n<td><code>50 4b 03 04</code></td>\n<td>ZIP (and ZIP-based formats: DOCX, XLSX, etc.)</td>\n</tr>\n<tr class=\"odd\">\n<td><code>ff d8 ff e0</code></td>\n<td>JPEG (JFIF; fourth byte may vary)</td>\n</tr>\n<tr class=\"even\">\n<td><code>89 50 4e 47</code></td>\n<td>PNG</td>\n</tr>\n<tr class=\"odd\">\n<td><code>4d 5a</code></td>\n<td>Windows PE executable</td>\n</tr>\n</tbody>\n</table>\n<p>Record the filename, inode, the actual magic bytes, and the true\nformat they indicate. What does the mismatch suggest?</p>\n<hr />"
  },
  {
    "title": "Task 7 — Timestamp Anomaly",
    "content": "<p>Examine the metadata for <code>meeting_notes.docx</code>:</p>\n<pre class=\"bash\"><code>istat -o 2048 exhibit-a.dd &lt;inode&gt;</code></pre>\n<p>NTFS maintains four timestamps per file in the\n<code>$STANDARD_INFORMATION</code> attribute:</p>\n<table>\n<thead>\n<tr class=\"header\">\n<th>Field</th>\n<th>Abbreviation</th>\n<th>Meaning</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>File Modified</td>\n<td><code>M</code></td>\n<td>When file content was last written</td>\n</tr>\n<tr class=\"even\">\n<td>Accessed</td>\n<td><code>A</code></td>\n<td>When the file was last read</td>\n</tr>\n<tr class=\"odd\">\n<td>MFT Modified</td>\n<td><code>C</code></td>\n<td>When the MFT entry itself was last changed</td>\n</tr>\n<tr class=\"even\">\n<td>Created</td>\n<td><code>B</code></td>\n<td>When the MFT entry was first created</td>\n</tr>\n</tbody>\n</table>\n<p>These are commonly referred to as MACB timestamps.</p>\n<p><strong>Expected output (abridged):</strong></p>\n<pre><code>$STANDARD_INFORMATION Attribute Values:\n...\nCreated:        2026-03-16 10:10:49.000000000 (UTC)\nFile Modified:  2026-03-05 16:42:00.000000000 (UTC)\nMFT Modified:   2026-03-16 10:10:49.000000000 (UTC)\nAccessed:       2026-03-16 10:10:49.000000000 (UTC)</code></pre>\n<p>Examine all four. Is there a relationship between any two that should\nbe impossible under normal filesystem operation? Record all four\ntimestamps and describe the anomaly precisely.</p>\n<hr />"
  },
  {
    "title": "Task 8 — Block-Level Examination",
    "content": "<p>The filesystem tells us which blocks a file <em>claims</em> to\noccupy. The block layer shows us what those blocks actually contain —\nand what neighboring blocks contain, regardless of what the filesystem\nsays.</p>\n<p>Pick any small allocated file from Task 3. Find its inode, then run\n<code>istat</code> to see its data run:</p>\n<pre class=\"bash\"><code>istat -o 2048 exhibit-a.dd &lt;inode&gt;</code></pre>\n<p>Near the end of the output you will see the allocated clusters.\nExample:</p>\n<pre><code>Attributes:\nType: $DATA (128-128-1)   Name: $Data   Non-Resident   size: 3502   init_size: 3502\n\nData run:\n884 @ 4408</code></pre>\n<p>This means the file occupies 884 sectors starting at\npartition-relative sector 4408, belonging to cluster 4408 / 8 = 551.</p>\n<p>Convert the first cluster address to a partition-relative sector (for\nthis image, 8 sectors per cluster):</p>\n<p><span class=\"math display\">sector = cluster × 8</span></p>\n<p>Check the allocation status of that sector:</p>\n<pre class=\"bash\"><code>blkstat -o 2048 exhibit-a.dd &lt;sector&gt;</code></pre>\n<p><strong>Expected output:</strong></p>\n<pre><code>Block: 4408\nAllocated\nInode: 42</code></pre>\n<p><code>blkstat</code> confirms the block is allocated and identifies\nits owning inode. Now read the raw block contents:</p>\n<pre class=\"bash\"><code>blkcat -o 2048 exhibit-a.dd &lt;sector&gt; | xxd</code></pre>\n<p>You should see the file’s content at the start. Look at the final\nlines of the output. Is the block completely filled, or are there bytes\nafter the file content ends?</p>\n<p><strong>Example — end of block showing file slack:</strong></p>\n<pre><code>00000da0: 69 6e 67 20 74 65 61 6d 20 69 6e 74 6f 0a 00 00  ing team into...\n00000db0: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00  ................\n00000dc0: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00  ................\n  ...\n00000ff0: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00  ................</code></pre>\n<p>The space between the end of the file’s data and the end of its last\nallocated block is called <em>file slack</em>. Note what you observe\nthere.</p>\n<p>Compute the expected slack for your chosen file:</p>\n<p><span class=\"math display\">slack (bytes) = cluster size − (file\nsize mod  cluster size)</span></p>\n<p>If the file size is an exact multiple of the cluster size, slack is\nzero. Otherwise the formula gives the number of unused bytes at the end\nof the last allocated cluster. Does your calculation match what you see\nin the <code>xxd</code> output?</p>\n<hr />"
  },
  {
    "title": "Task 9 — Leading Slack: Survey",
    "content": "<p>Return to the <code>mmls</code> output from Task 1. The unallocated\nregion occupies sectors 1 through 2047 — the gap that precedes the NTFS\npartition and has no filesystem assigned to it.</p>\n<p>TSK tools address blocks relative to a filesystem when given\n<code>-o</code>. To inspect raw disk sectors directly — outside any\nfilesystem — use <code>dd</code>.</p>\n<p>Inspect the first sector of this region:</p>\n<pre class=\"bash\"><code>dd if=exhibit-a.dd bs=512 skip=1 count=1 | xxd</code></pre>\n<p><strong>Expected output (first two and last line):</strong></p>\n<pre><code>00000000: eb 3c 90 6d 6b 66 73 2e 66 61 74 00 02 01 06 00  .&lt;.mkfs.fat.....\n00000010: 02 00 00 f8 03 00 3f 00 ff 00 01 00 00 00 00 00  ......?.........\n  ...\n000001f0: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 55 aa  ..............U.</code></pre>\n<p>Look at the first 16 bytes and the final two bytes of the output.\nNote the printable string at bytes 3–10 and the two-byte value at bytes\n510–511. Do you recognize either?</p>\n<p>Now get a broader view by looking for printable content across the\nentire region:</p>\n<pre class=\"bash\"><code>dd if=exhibit-a.dd bs=512 skip=1 count=2046 | strings | head -40</code></pre>\n<p><strong>Expected output (representative):</strong></p>\n<pre><code>mkfs.fat\n;This program cannot be run in DOS mode.\nhashcat\njohn\nnmap\nwireshark\n/etc/shadow\nold.speeding.turtle\ncold.amber.river\nquiet.stone.bridge\nfading.copper.lamp\nsilent.iron.gate\nhollow.birch.crossing\nburning.slate.window\nPK\nproject_alpha.txt\nemployee_list.csv\ncredentials.txt</code></pre>\n<p>Record what categories of content appear. Is the region uniform, or\nare there distinct sections with different character?</p>\n<hr />"
  },
  {
    "title": "Task 10 — Leading Slack: Last Block",
    "content": "<p>The last sector before the NTFS partition is sector 2047. Extract\nit:</p>\n<pre class=\"bash\"><code>dd if=exhibit-a.dd bs=512 skip=2047 count=1 | xxd</code></pre>\n<p><strong>Expected output:</strong></p>\n<pre><code>00000000: 64 75 73 74 79 2e 6c 61 6e 74 65 72 6e 2e 66 61  dusty.lantern.fa\n00000010: 64 69 6e 67 2e 77 69 6e 74 65 72 2e 63 6f 70 70  ding.winter.copp\n00000020: 65 72 2e 68 6f 6c 6c 6f 77 00 00 00 00 00 00 00  er.hollow.......\n  ...\n000001f0: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00  ................</code></pre>\n<p>Consider:</p>\n<ul>\n<li>What format is the content?</li>\n<li>Does it relate to anything else you have found on this image?</li>\n<li>This sector lies outside any filesystem and outside any file. How do\nyou think it came to contain this content?</li>\n</ul>\n<p>Do not attempt to act on what you find here yet. Note it and move on\n— this is a thread the homework will ask you to pull.</p>\n<hr />"
  },
  {
    "title": "Task 11 — Findings Summary",
    "content": "<p>Before leaving the lab, compile your notes into a brief findings\nsummary covering:</p>\n<ol type=\"1\">\n<li>Image hash (from Task 0)</li>\n<li>Partition layout: what is present, what is unallocated</li>\n<li>File timeline: key dates, any clustering or anomalies observed</li>\n<li>Every forensically significant artifact found on the NTFS surface,\nwith a finding and interpretation for each</li>\n<li>Block-level observation: what the file slack examination showed</li>\n<li>What you found in the leading slack (Tasks 9–10) and what questions\nit raises</li>\n<li>One sentence describing what the disk, taken as a whole, appears to\nrepresent</li>\n</ol>\n<p>This summary is the starting point for the homework assignment, which\ncontinues the investigation below the filesystem layer.</p>"

<!-- ── Navigation Engine ───────────────────────────────────────── -->
<script>
(function () {
  const steps  = STEPS;
  const TOTAL  = steps.length;
  let current  = 0;

  const stepView    = document.getElementById('step-view');
  const stepList    = document.getElementById('step-list');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const stepCounter = document.getElementById('step-counter');
  const topbarMeta  = document.getElementById('topbar-meta');

  // Build sidebar
  steps.forEach((step, i) => {
    const li = document.createElement('li');
    li.innerHTML =
      `<span class="step-num">${i + 1}</span>` +
      `<span class="step-lbl">${step.title}</span>`;
    li.addEventListener('click', () => go(i));
    stepList.appendChild(li);
  });

  function go(idx) {
    if (idx < 0 || idx >= TOTAL) return;
    current = idx;

    stepView.innerHTML =
      `<div class="step-hdr">` +
        `<div class="step-badge">${idx + 1}</div>` +
        `<h1>${steps[idx].title}</h1>` +
      `</div>` +
      steps[idx].content;

    // Re-trigger animation
    stepView.style.animation = 'none';
    void stepView.offsetWidth;
    stepView.style.animation = '';

    window.scrollTo(0, 0);

    document.querySelectorAll('#step-list li').forEach((li, i) => {
      li.classList.toggle('active', i === idx);
    });

    btnPrev.classList.toggle('hidden', idx === 0);
    btnNext.textContent = idx === TOTAL - 1 ? 'Done ✓' : 'Next →';

    stepCounter.textContent = `${idx + 1} of ${TOTAL}`;
    topbarMeta.textContent  = `Step ${idx + 1} / ${TOTAL}`;
  }

  btnPrev.addEventListener('click', () => go(current - 1));
  btnNext.addEventListener('click', () => { if (current < TOTAL - 1) go(current + 1); });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(current + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(current - 1);
  });

  go(0);
})();
</script>
